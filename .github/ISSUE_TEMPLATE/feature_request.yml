name: Feature request
description: Propose a new capability or workflow improvement
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature, command, or UX you want
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Links, examples, adapter names, or prior art
